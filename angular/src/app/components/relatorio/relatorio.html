<div style="padding: 20px; font-family: Arial, sans-serif;">
  <h2>Gerar Novo Relatório</h2>

  <form (ngSubmit)="submeterFormulario()" style="margin-bottom: 30px;">
    
    <label style="display:block; margin: 10px 0 5px 0;">Selecionar Entidade:</label>
    <select [(ngModel)]="idEntidadeSelecionada" name="entidade" required style="padding: 5px; width: 300px;">
      <option value="">-- Escolha uma Entidade --</option>
      <option *ngFor="let ent of entidades" [value]="ent._id">{{ ent.nome }} (NIF: {{ ent.nif }})</option>
    </select>

    <label style="display:block; margin: 10px 0 5px 0;">Selecionar Período:</label>
    <select [(ngModel)]="idPeriodoSelecionado" name="periodo" required style="padding: 5px; width: 300px;">
      <option value="">-- Escolha um Período --</option>
      <option *ngFor="let per of periodos" [value]="per._id">Ano: {{ per.ano }} - Trimestre: {{ per.trimestre }}º</option>
    </select>

    <label style="display:block; margin: 10px 0 5px 0;">Versão do Esquema:</label>
    <input [(ngModel)]="novoRelatorio.versao_esquema" name="versao_esquema" placeholder="Ex: V1.0.2" required style="padding: 5px; width: 290px;"><br><br>

    <button type="submit" style="padding: 7px 15px; background-color: #28a745; color: white; border: none; cursor: pointer; border-radius: 4px;">Gerar Relatório</button>
  </form>

  <hr>

  <h2>Histórico de Relatórios</h2>
  
  <table border="1" cellpadding="8" style="border-collapse: collapse; width: 100%; text-align: left;">
    <thead>
      <tr style="background-color: #f2f2f2;">
        <th>ID do Relatório</th>
        <th>🏢 Entidade</th>
        <th>📅 Período</th>
        <th>🏷️ Versão Esquema</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let rel of relatorios">
        <td>{{ rel._id }}</td>
        
        <td>{{ rel.id_entidade?.nome || 'Entidade Desconhecida' }}</td>
        
        <td>
          <span *ngIf="rel.id_periodo">
            Ano: {{ rel.id_periodo.ano }} - Trimestre: {{ rel.id_periodo.trimestre }}º
          </span>
          <span *ngIf="!rel.id_periodo">Período Desconhecido</span>
        </td>
        
        <td>{{ rel.versao_esquema }}</td>
      </tr>
    </tbody>
  </table>
</div>
