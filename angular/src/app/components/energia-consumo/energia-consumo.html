<div style="padding: 20px; font-family: Arial, sans-serif;">
  <h2>Registar Consumo de Energia</h2>

  <div *ngIf="relatorios.length === 0" style="background-color: #f8d7da; color: #721c24; padding: 15px; border-radius: 4px; margin-bottom: 20px; border: 1px solid #f5c6cb;">
    ⚠️ <strong>Atenção:</strong> O consumo de energia deve ser associado a um Relatório. Crie primeiro um <strong>Relatório</strong> no menu correspondente para poder avançar.
  </div>

  <form *ngIf="relatorios.length > 0" (ngSubmit)="submeterFormulario()" style="margin-bottom: 30px;">
    
    <label style="display:block; margin: 10px 0 5px 0;">Associar ao Relatório:</label>
    <select [(ngModel)]="idRelatorioSelecionado" name="relatorio" required style="padding: 5px; width: 300px;">
      <option value="">-- Selecione um Relatório --</option>
      <option *ngFor="let rel of relatorios" [value]="rel._id">
        ID: {{ rel._id }} (Esquema: {{ rel.versao_esquema }})
      </option>
    </select>

    <label style="display:block; margin: 10px 0 5px 0;">Quantidade Consumida:</label>
    <input type="number" step="0.01" [(ngModel)]="novoConsumo.quantidade" name="quantidade" required style="padding: 5px; width: 290px;">

    <label style="display:block; margin: 10px 0 5px 0;">Unidade de Medida:</label>
    <select [(ngModel)]="novoConsumo.unidade" name="unidade" required style="padding: 5px; width: 300px;">
      <option value="kWh">kWh</option>
      <option value="MWh">MWh</option>
      <option value="GJ">GJ</option>
    </select><br><br>

    <button type="submit" style="padding: 7px 15px; background-color: #ffc107; color: black; border: none; font-weight: bold; cursor: pointer; border-radius: 4px;">Registar Consumo</button>
  </form>

  <hr>
  <h2>Histórico de Consumos de Energia</h2>
  </div>
