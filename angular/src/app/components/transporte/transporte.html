<div style="padding: 20px; font-family: Arial, sans-serif;">
    <h2>Registar Dados de Transporte</h2>
    <form (ngSubmit)="submeterFormulario()" style="margin-bottom: 30px;">
      
      <label style="display:block; margin: 10px 0 5px 0;">Associar ao Relatório:</label>
      <select [(ngModel)]="idRelatorioSelecionado" name="relatorio" required style="padding: 5px; width: 320px;">
        <option value="">-- Selecione um Relatório --</option>
        <option *ngFor="let rel of relatorios" [value]="rel._id">
          ID: {{ rel._id }} (Esquema: {{ rel.versao_esquema }})
        </option>
      </select>
  
      <label style="display:block; margin: 10px 0 5px 0;">Tipo de Veículo:</label>
      <select [(ngModel)]="novoTransporte.tipo_veiculo" name="tipo_veiculo" required style="padding: 5px; width: 320px;">
        <option value="carro">Carro Ligeiro</option>
        <option value="camiao">Camião / Transporte de Carga</option>
        <option value="comboio">Comboio</option>
        <option value="aviao">Avião</option>
      </select>
  
      <label style="display:block; margin: 10px 0 5px 0;">Distância Percorrida (km):</label>
      <input type="number" min="0" [(ngModel)]="novoTransporte.distancia_km" name="distancia_km" required style="padding: 5px; width: 310px;">
  
      <label style="display:block; margin: 10px 0 5px 0;">Fator de Emissão (gCO2/km):</label>
      <input type="number" step="0.01" [(ngModel)]="novoTransporte.fator_emissao_gco2_per_km" name="fator_emissao_gco2_per_km" required style="padding: 5px; width: 310px;"><br><br>
  
      <button type="submit" style="padding: 7px 15px; background-color: #28a745; color: white; border: none; cursor: pointer;">Guardar Transporte</button>
    </form>
  
    <hr>
  
    <h2>Registos de Transporte</h2>
    <table border="1" cellpadding="8" style="border-collapse: collapse; width: 100%; text-align: left;">
      <thead>
        <tr style="background-color: #f2f2f2;">
          <th>ID Registo</th>
          <th>Relatório Associado</th>
          <th>Tipo Veículo</th>
          <th>Distância</th>
          <th>Fator de Emissão</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let t of transportes">
          <td>{{ t._id }}</td>
          <td>{{ t.id_relatorio }}</td>
          <td style="text-transform: capitalize;">{{ t.tipo_veiculo }}</td>
          <td>{{ t.distancia_km }} km</td>
          <td>{{ t.fator_emissao_gco2_per_km }} gCO2/km</td>
        </tr>
      </tbody>
    </table>
  </div>
