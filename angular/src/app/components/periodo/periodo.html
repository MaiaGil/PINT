<div style="padding: 20px; font-family: Arial, sans-serif;">
  <h2>Gerir Períodos</h2>

  <form (ngSubmit)="submeterFormulario()" style="margin-bottom: 20px;">
    <input type="number" [(ngModel)]="novoPeriodo.ano" name="ano" placeholder="Ano" required style="padding: 5px; width: 150px; margin-right: 10px;">
    
    <select [(ngModel)]="novoPeriodo.trimestre" name="trimestre" required style="padding: 5px; margin-right: 10px;">
      <option [ngValue]="null" disabled selected>-- Trimestre --</option>
      <option [ngValue]="1">1º Trimestre</option>
      <option [ngValue]="2">2º Trimestre</option>
      <option [ngValue]="3">3º Trimestre</option>
      <option [ngValue]="4">4º Trimestre</option>
    </select>

    <button type="submit" style="padding: 6px 12px; cursor: pointer;">Criar Período</button>
  </form>

  <ul style="list-style-type: disc; padding-left: 20px; font-size: 18px;">
    <li *ngFor="let per of periodos" style="margin-bottom: 8px;">
      Ano: {{ per.ano }} - Trimestre: {{ per.trimestre }}º
      
      <span *ngIf="ePeriodoAtual(per.ano, per.trimestre)" 
            style="background-color: #28a745; color: white; font-size: 12px; font-weight: bold; padding: 3px 8px; border-radius: 12px; margin-left: 10px; display: inline-block; vertical-align: middle;">
        Período Atual 🌟
      </span>
    </li>
  </ul>
</div>
