<div style="padding: 20px; font-family: Arial, sans-serif;">
    <h2>Registar Mix de Energia</h2>
    <form (ngSubmit)="submeterFormulario()" style="margin-bottom: 30px;">
      
      <label style="display:block; margin: 10px 0 5px 0;">Associar ao Consumo de Energia (ID):</label>
      <select [(ngModel)]="idEnergiaConsumoSelecionado" name="energiaConsumo" required style="padding: 5px; width: 320px;">
        <option value="">-- Selecione um Consumo Base --</option>
        <option *ngFor="let c of consumos" [value]="c._id">
          ID: {{ c._id }} (Qtd: {{ c.quantidade }} {{ c.unidade }})
        </option>
      </select>
  
      <label style="display:block; margin: 10px 0 5px 0;">Fonte de Energia:</label>
      <select [(ngModel)]="novoMix.fonte" name="fonte" required style="padding: 5px; width: 320px;">
        <option value="renovavel">Renovável</option>
        <option value="nao-renovavel">Não Renovável</option>
        <option value="mista">Mista</option>
      </select>
  
      <label style="display:block; margin: 10px 0 5px 0;">Percentagem do Mix (%):</label>
      <input type="number" min="0" max="100" [(ngModel)]="novoMix.percentagem" name="percentagem" required style="padding: 5px; width: 310px;">
  
      <label style="display:block; margin: 10px 0 5px 0;">Fator de Emissão (gCO2/kWh):</label>
      <input type="number" step="0.01" [(ngModel)]="novoMix.fator_emissao_gco2_per_kwh" name="fator_emissao_gco2_per_kwh" required style="padding: 5px; width: 310px;"><br><br>
  
      <button type="submit" style="padding: 7px 15px; background-color: #17a2b8; color: white; border: none; cursor: pointer;">Guardar Mix</button>
    </form>
  
    <hr>
  
    <h2>Registos de Mix de Energia</h2>
    <table border="1" cellpadding="8" style="border-collapse: collapse; width: 100%; text-align: left;">
      <thead>
        <tr style="background-color: #f2f2f2;">
          <th>ID Mix</th>
          <th>ID Consumo Origem</th>
          <th>Fonte</th>
          <th>Percentagem</th>
          <th>Fator Emissão</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let m of mixes">
          <td>{{ m._id }}</td>
          <td>{{ m.id_energia_consumo }}</td>
          <td style="text-transform: capitalize;">{{ m.fonte }}</td>
          <td>{{ m.percentagem }}%</td>
          <td>{{ m.fator_emissao_gco2_per_kwh }} gCO2/kWh</td>
        </tr>
      </tbody>
    </table>
  </div>
