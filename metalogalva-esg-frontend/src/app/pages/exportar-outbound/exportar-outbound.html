<div class="container">
  <header class="header">
    <div>
      <h1>📤 Relatório Outbound ESG por Período</h1>
      <p>Exportação consolidada baseada nos resultados de KPIs calculados e validados na BD.</p>
    </div>
  </header>

  <div class="card-seletor">
    <div class="campo-escolha">
      <label>Selecione o Período Crítico de Análise:</label>
      <select [(ngModel)]="idPeriodoSelecionado" [disabled]="aCarregar || aProcessar">
        <option value="">— Escolha o período (Ex: Ano / Mês) —</option>
        
        <option *ngFor="let p of periodos" [value]="p.id_periodo">
          {{ p.labelLegivel }}
        </option>
        
      </select>
    </div>

    <button class="btn-gerar" (click)="gerarOutbound()" [disabled]="aCarregar || aProcessar || !idPeriodoSelecionado">
      <span *ngIf="!aProcessar">📊 Compilar Resultados KPI</span>
      <span *ngIf="aProcessar">⏳ A ler Tabela resultadokpi...</span>
    </button>
  </div>

  <div class="alert erro" *ngIf="mensagemErro">❌ {{ mensagemErro }}</div>

  <div class="preview-container" *ngIf="jsonGerado">
    <div class="preview-header">
      <h3>Visualização da Árvore JSON Normativa</h3>
      <button class="btn-download" (click)="descarregarFicheiroJSON()">
        💾 Exportar Ficheiro .json
      </button>
    </div>
    
    <div class="codigo-wrapper">
      <pre><code>{{ jsonGerado | json }}</code></pre>
    </div>
  </div>
</div>
